apiVersion: v1
kind: Pod
metadata:
  name: load-generator
spec:
  restartPolicy: Never
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            wget -q -O- http://student-api-service.default.svc.cluster.local > /dev/null
          done
